<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Registered Students</h1>

<table border="1">

    <tr>
        <th>Name</th>
        <th>Roll Number</th>
        <th>Department</th>
        <th>Year</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Gender</th>
        <th>Address</th>
    </tr>

    {% for student in students %}

    <tr>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
        <td>{{ student[4] }}</td>
        <td>{{ student[5] }}</td>
        <td>{{ student[6] }}</td>
        <td>{{ student[7] }}</td>
        <td>{{ student[8] }}</td>
    </tr>

    {% endfor %}

</table>

</body>
</html>
