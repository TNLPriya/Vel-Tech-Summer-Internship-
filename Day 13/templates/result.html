<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141E30, #243B55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 700px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 35px;
            color: #ddd;
        }

        .result-box {
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .graduate {
            background: rgba(46, 204, 113, 0.2);
            border: 3px solid #2ecc71;
        }

        .dropout {
            background: rgba(231, 76, 60, 0.2);
            border: 3px solid #e74c3c;
        }

        .enrolled {
            background: rgba(241, 196, 15, 0.2);
            border: 3px solid #f1c40f;
        }

        .status {
            font-size: 50px;
            font-weight: bold;
            margin: 20px 0;
        }

        .confidence {
            font-size: 28px;
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(to right, #00F260, #0575E6);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            transition: 0.3s;
        }

        .button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📊 Prediction Result</h1>
        <div class="subtitle">
            Student Academic Outcome Prediction
        </div>

        {% if prediction == "Graduate" %}
        <div class="result-box graduate">

        {% elif prediction == "Dropout" %}
        <div class="result-box dropout">

        {% else %}
        <div class="result-box enrolled">
        {% endif %}

            <h2>Student Status:</h2>

            <div class="status">
                {{ prediction }}
            </div>

            <div class="confidence">
                Confidence Score:
                <strong>{{ confidence }}%</strong>
            </div>

        </div>

        <a href="/" class="button">
            🔁 Predict Again
        </a>

    </div>

</body>
</html>
