<!DOCTYPE html>
<html>
<head>
    <title>Login - Student Dropout System</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;

            background:
            linear-gradient(
            rgba(0,0,0,0.55),
            rgba(0,0,0,0.55)),

            url('https://images.unsplash.com/photo-1522202176988-66273c2fd55?w=1600');

            background-size:cover;
            background-position:center;
        }

        /* Floating animation */

        body::before{
            content:'';
            position:absolute;
            width:500px;
            height:500px;
            background:#06b6d4;
            border-radius:50%;
            top:-150px;
            left:-150px;
            filter:blur(130px);
            opacity:0.25;
            animation:move1 8s infinite alternate;
        }

        body::after{
            content:'';
            position:absolute;
            width:450px;
            height:450px;
            background:#2563eb;
            border-radius:50%;
            bottom:-150px;
            right:-150px;
            filter:blur(130px);
            opacity:0.25;
            animation:move2 8s infinite alternate;
        }

        @keyframes move1{
            from{
                transform:translate(0,0);
            }
            to{
                transform:translate(60px,40px);
            }
        }

        @keyframes move2{
            from{
                transform:translate(0,0);
            }
            to{
                transform:translate(-60px,-40px);
            }
        }

        .login-box{

            position:relative;
            z-index:1;

            width:420px;

            background:
            rgba(255,255,255,0.08);

            backdrop-filter:blur(25px);

            border:1px solid
            rgba(255,255,255,0.2);

            border-radius:35px;

            padding:45px;

            box-shadow:
            0 8px 35px rgba(0,0,0,0.4);

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(50px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{
            text-align:center;
            margin-bottom:20px;
        }

        .logo i{
            font-size:65px;
            color:#38bdf8;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            font-size:34px;
            color:white;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:35px;
        }

        .input-group{
            position:relative;
            margin-bottom:22px;
        }

        .input-group i{
            position:absolute;
            top:18px;
            left:18px;
            color:#38bdf8;
            font-size:18px;
        }

        input{
            width:100%;
            padding:18px 18px 18px 50px;
            border:none;
            outline:none;
            border-radius:18px;

            background:
            rgba(255,255,255,0.12);

            color:white;
            font-size:16px;
        }

        input::placeholder{
            color:#d1d5db;
        }

        .btn{
            width:100%;
            border:none;
            padding:18px;
            border-radius:18px;

            background:
            linear-gradient(
            to right,
            #06b6d4,
            #2563eb);

            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;

            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-4px);
            box-shadow:
            0 10px 20px rgba(37,99,235,0.4);
        }

        .error{
            color:#f87171;
            text-align:center;
            margin-top:15px;
            font-size:15px;
        }

    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <i class="fas fa-user-graduate"></i>
    </div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Student Dropout Prediction System
    </p>

    <form method="POST">

        <div class="input-group">
            <i class="fas fa-user"></i>

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>
        </div>

        <button class="btn">
            Login
        </button>

    </form>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

</div>

</body>
</html>
